name: release rehearsal

on:
  pull_request:
    branches: [main]
    paths-ignore: ['**/*.md', 'docs/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-pr-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    if: startsWith(github.head_ref, 'release/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Verify version consistency
        run: |
          TAURI_VER=$(node -p "require('./apps/app/src-tauri/tauri.conf.json').version")
          PKG_VER=$(node -p "require('./apps/app/package.json').version")
          ROOT_VER=$(node -p "require('./package.json').version")
          CARGO_VER=$(grep -m1 '^version' apps/app/src-tauri/Cargo.toml | cut -d'"' -f2)
          echo "tauri=$TAURI_VER pkg=$PKG_VER root=$ROOT_VER cargo=$CARGO_VER"
          test "$TAURI_VER" = "$PKG_VER" -a "$PKG_VER" = "$ROOT_VER" -a "$ROOT_VER" = "$CARGO_VER"

      - name: Verify pocketbase.sha256 covers all triples
        run: |
          for triple in aarch64-apple-darwin x86_64-apple-darwin x86_64-pc-windows-msvc x86_64-unknown-linux-gnu; do
            grep -q "^$triple " pb/pocketbase.sha256 || { echo "missing: $triple"; exit 1; }
          done

      - name: Verify required secrets configured (existence only)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          # WINDOWS_CERTIFICATE: skipped — macOS-only smoke release (re-enable when Windows OV cert lands)
          # WINDOWS_CERTIFICATE_PASSWORD: skipped — macOS-only smoke release
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          for var in APPLE_CERTIFICATE APPLE_CERTIFICATE_PASSWORD APPLE_SIGNING_IDENTITY APPLE_TEAM_ID APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER TAURI_SIGNING_PRIVATE_KEY TAURI_SIGNING_PRIVATE_KEY_PASSWORD; do
            if [ -z "${!var}" ]; then echo "missing secret: $var"; exit 1; fi
          done
          echo "all secrets configured"

  build:
    needs: preflight
    if: startsWith(github.head_ref, 'release/') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        # macOS-only smoke release. Re-enable Windows + Linux entries once
        # WINDOWS_CERTIFICATE secrets land and the Linux libsam3 RPATH path
        # has been exercised in CI.
        include:
          - os: macos-14
            triple: aarch64-apple-darwin
            bundles: dmg,app
          - os: macos-13
            triple: x86_64-apple-darwin
            bundles: dmg,app
          # - os: windows-2022
          #   triple: x86_64-pc-windows-msvc
          #   bundles: nsis
          # - os: ubuntu-22.04
          #   triple: x86_64-unknown-linux-gnu
          #   bundles: deb,appimage

    runs-on: ${{ matrix.os }}
    env:
      TAURI_ENV_TARGET_TRIPLE: ${{ matrix.triple }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - run: corepack enable

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.triple }}

      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/app/src-tauri -> target
          key: ${{ matrix.triple }}

      - name: Resolve sam3.c submodule SHA
        id: sam3
        # Cache key is the parent-pinned submodule commit. Stable across
        # releases that don't bump the submodule, even if the parent repo
        # has incidental changes elsewhere. First build on a given submodule
        # SHA is cold (~60 min on macOS due to mlx-c + Metal); subsequent
        # builds on the same SHA hit the cache (~seconds).
        run: echo "sha=$(git ls-tree HEAD vendor/sam3.c | awk '{print $3}')" >> "$GITHUB_OUTPUT"

      # Split restore/save so the sam3 cache persists even if a later
      # step (Tauri build, signing, notarization) fails. Default
      # actions/cache@v4 only saves on full job success — we want the
      # 60+ min sam3 build to survive across iterations of unrelated
      # downstream fixes.
      - name: Restore sam3 build cache
        id: sam3cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: vendor/sam3.c/build
          key: sam3-${{ matrix.os }}-${{ steps.sam3.outputs.sha }}

      - name: Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libssl-dev cmake

      - run: pnpm install --frozen-lockfile

      # Persistent keychain so sign-mac.mjs can run codesign after
      # Tauri's bundler has done its own (temp-keychain-based) signing
      # and cleaned up. Without this, codesign post-bundle errors with
      # "The specified item could not be found in the keychain."
      - name: Set up macOS signing keychain
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE_B64: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/netra-limbus-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 24)"
          CERT_PATH="$RUNNER_TEMP/cert.p12"

          printf '%s' "$APPLE_CERTIFICATE_B64" | base64 -D -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH" >/dev/null

          # Add ours to the user search list, keeping the runner's existing ones.
          existing=$(security list-keychain -d user | tr -d '"' | tr -s ' ')
          security list-keychain -d user -s "$KEYCHAIN_PATH" $existing

          rm "$CERT_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Stage PocketBase
        run: node scripts/release/fetch-pocketbase.mjs

      - name: Build sam3
        run: node scripts/build-sam3.mjs

      - name: Save sam3 build cache
        if: always() && steps.sam3cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: vendor/sam3.c/build
          key: sam3-${{ matrix.os }}-${{ steps.sam3.outputs.sha }}

      - name: Sign libsam3.dll (Windows)
        if: runner.os == 'Windows'
        run: node scripts/release/sign-windows.mjs

      - name: Build app
        run: pnpm --filter @netra-limbus/app build

      - name: Tauri build
        run: pnpm --filter @netra-limbus/app tauri build --target ${{ matrix.triple }} --bundles ${{ matrix.bundles }}

      - name: Verify mac binary @rpath
        if: runner.os == 'macOS'
        run: node scripts/release/verify-mac-binary.mjs

      - name: Sign mac binaries
        if: runner.os == 'macOS'
        run: node scripts/release/sign-mac.mjs

      - name: Self-check (rehearsal smoke)
        shell: bash
        run: |
          case "${{ matrix.triple }}" in
            aarch64-apple-darwin|x86_64-apple-darwin)
              ./apps/app/src-tauri/target/${{ matrix.triple }}/release/netra-limbus --self-check
              ;;
            x86_64-pc-windows-msvc)
              ./apps/app/src-tauri/target/${{ matrix.triple }}/release/netra-limbus.exe --self-check
              ;;
            x86_64-unknown-linux-gnu)
              ./apps/app/src-tauri/target/${{ matrix.triple }}/release/netra-limbus --self-check
              ;;
          esac

      - name: Upload artifacts (rehearsal)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rehearsal-${{ matrix.triple }}
          path: |
            apps/app/src-tauri/target/${{ matrix.triple }}/release/bundle/**/*.dmg
            apps/app/src-tauri/target/${{ matrix.triple }}/release/bundle/**/*.exe
            apps/app/src-tauri/target/${{ matrix.triple }}/release/bundle/**/*.deb
            apps/app/src-tauri/target/${{ matrix.triple }}/release/bundle/**/*.AppImage
            apps/app/src-tauri/target/${{ matrix.triple }}/release/bundle/**/*.tar.gz
            apps/app/src-tauri/target/${{ matrix.triple }}/release/bundle/**/*.zip
            apps/app/src-tauri/target/${{ matrix.triple }}/release/bundle/**/*.sig
          retention-days: 7

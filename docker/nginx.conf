server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Match PocketBase's per-field size limit so the proxy doesn't truncate
  # uploads before they reach PB. The `videos.file` field is configured for
  # 500 MB; bump this if you raise PB's cap further.
  client_max_body_size 512m;

  # Static SPA — fall back to index.html so client-side routes resolve.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # PocketBase REST + realtime. proxy_buffering off keeps SSE streams
  # (used for realtime subscriptions) flowing without nginx stashing them.
  location /api/ {
    proxy_pass http://pb:8090;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
    proxy_read_timeout 3600s;
  }

  # PocketBase admin dashboard (http://<host>/_/)
  location /_/ {
    proxy_pass http://pb:8090;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#FFFFFF" />
    <title>NetraRT — Infinite Canvas</title>

    <link rel="icon" href="/assets/favicon/favicon.ico" sizes="any" />
    <link rel="icon" href="/assets/favicon/favicon-16.png" type="image/png" sizes="16x16" />
    <link rel="apple-touch-icon" href="/assets/favicon/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon/android-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/assets/favicon/android-512.png" />

    <!-- Space Mono + Caveat are self-hosted via tokens.css. Inter still
         comes from Google Fonts, matching the canonical design system. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Remix Icon — the brand's first-class icon font, used throughout
         the landing page (header, hero, use-case cards, waitlist, footer). -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/remixicon@4.7.0/fonts/remixicon.css"
    />
    <link
      rel="preload"
      href="/fonts/SpaceMono-Regular.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/SpaceMono-Bold.ttf"
      as="font"
      type="font/ttf"
      crossorigin
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
